services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    environment:
      DOMAIN: ${DOMAIN:-tota.pit.com.ar}
      FRONTEND_URL: ${FRONTEND_URL:-https://tota.pit.com.ar}
      API_URL: ${API_URL:-https://tota.pit.com.ar/api}
      DATABASE_URL: ${DATABASE_URL:-postgresql://tota:change_me@postgres:5432/tota}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://192.168.2.252:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      TTS_PROVIDER: ${TTS_PROVIDER:-browser}
      PIPER_BASE_URL: ${PIPER_BASE_URL:-http://192.168.2.252:5000}
      STT_PROVIDER: ${STT_PROVIDER:-mock}
      WHISPER_BASE_URL: ${WHISPER_BASE_URL:-http://whisper:9000}
      AUTOMATION_PROVIDER: ${AUTOMATION_PROVIDER:-mock}
      HOME_ASSISTANT_URL: ${HOME_ASSISTANT_URL:-}
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-}
      MQTT_HOST: ${MQTT_HOST:-mqtt}
      MQTT_PORT: ${MQTT_PORT:-1883}
      FIBARO_URL: ${FIBARO_URL:-}
      FIBARO_USER: ${FIBARO_USER:-}
      FIBARO_PASSWORD: ${FIBARO_PASSWORD:-}
      AKUBELA_URL: ${AKUBELA_URL:-}
      AKUBELA_TOKEN: ${AKUBELA_TOKEN:-}
      SHELLY_URL: ${SHELLY_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tota}
      POSTGRES_USER: ${POSTGRES_USER:-tota}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tota} -d ${POSTGRES_DB:-tota}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  uploads_data:
